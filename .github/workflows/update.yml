name: update

on:
  schedule:
    - cron: "0 5 * * 1" # Mondays 05:00 UTC
  workflow_dispatch:

# The default GITHUB_TOKEN suffices: since June 2026, pull_request runs on
# PRs created with it start in an approval-required state instead of being
# suppressed, so the weekly PR needs one "Approve workflows to run" click
# (see DEVELOP.md). PR creation also needs the "Allow GitHub Actions to
# create and approve pull requests" repo setting.
permissions:
  contents: write
  pull-requests: write

env:
  NIX_CONFIG: experimental-features = nix-command flakes

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        run: |
          curl -L https://nixos.org/nix/install | sh -s -- --daemon --yes
          echo /nix/var/nix/profiles/default/bin >> "$GITHUB_PATH"

      # Two invocations: `update` takes package names variadically, so
      # `just update update-nixpkgs` would look for a package by that name.
      - name: Update packages
        run: nix run nixpkgs#just -- update

      - name: Update nixpkgs pin
        run: nix run nixpkgs#just -- update-nixpkgs

      # Open the PR before tests pass: failures should surface as a red PR,
      # not vanish in the Actions tab.
      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Everything already up to date."
            exit 0
          fi
          # The PR targets whatever branch the workflow ran on: cron only
          # ever runs on the default branch, and manual dispatch on a test
          # branch stays confined to it (see DEVELOP.md "Testing").
          base="$GITHUB_REF_NAME"
          head="auto-update"
          [ "$base" = "main" ] || head="auto-update-$base"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch --create "$head"
          git add --all
          # nixpkgs-style message from what actually changed: subject
          # "Update foo, nixpkgs", body "foo: 1.2 -> 1.3" per package.
          names=()
          body=""
          for dir in $(git diff --cached --name-only | sed -n 's|^\(pkgs/by-name/[^/]*/[^/]*\)/.*|\1|p' | sort -u); do
            name=$(basename "$dir")
            old=$(git show "HEAD:$dir/package.nix" | sed -n 's/^ *version = "\([^"]*\)".*/\1/p' | head -n1)
            new=$(sed -n 's/^ *version = "\([^"]*\)".*/\1/p' "$dir/package.nix" | head -n1)
            names+=("$name")
            body+="$name: ${old:-?} -> ${new:-?}"$'\n'
          done
          pkgcount=${#names[@]}
          if ! git diff --cached --quiet -- flake.lock; then
            old=$(git show HEAD:flake.lock | jq -r '.nodes.nixpkgs.locked.rev' | cut -c1-7)
            new=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock | cut -c1-7)
            names+=("nixpkgs")
            body+="nixpkgs: $old -> $new"$'\n'
          fi
          # Git convention: subject <= 50 chars; fall back to a count when
          # the name list doesn't fit. Body lines stay under 72 naturally.
          joined=$(printf '%s, ' "${names[@]}")
          subject="Update ${joined%, }"
          if [ "${#subject}" -gt 50 ]; then
            subject="Update $pkgcount packages"
            [ "$pkgcount" = "${#names[@]}" ] || subject+=" and nixpkgs"
          fi
          git commit --message "$subject" --message "$body"
          # Force-push so reruns replace a stale branch; a push to a branch
          # with an open PR updates that PR.
          git push --force origin "$head"
          pr=$(gh pr list --head "$head" --state open --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            gh pr create --base "$base" --head "$head" \
              --title "$subject" --body "$body"
          else
            # a force-push changed the PR's contents; resync its description
            gh pr edit "$pr" --title "$subject" --body "$body"
          fi
